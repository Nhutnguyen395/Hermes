name: Hermes CI/CD pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 1. Explicitly setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 2. Added the --load flag to export the image to the local daemon
      - name: Build Origin Service Image
        run: docker build --load -t hermes/origin-service:1.2.0 ./src/origin-service

      - name: Build Go Invalidator Image
        run: docker build --load -t hermes/invalidator-sidecar:1.0.2 ./src/invalidator-sidecar

      # 3. Create the Kind Cluster
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          config: ./k8s/cluster-setup/kind-config.yaml
          cluster_name: hermes-cluster

      # 4. Load the images directly into Kind (Now that they exist locally!)
      - name: Load Docker Images into Kind
        run: |
          kind load docker-image hermes/origin-service:1.2.0 --name hermes-cluster
          kind load docker-image hermes/invalidator-sidecar:1.0.2 --name hermes-cluster

      # 5. Deploy Infrastructure (Kafka & Gateway API)
      - name: Install Operators
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
          helm repo add strimzi https://strimzi.io/charts/
          helm install strimzi-kafka-operator strimzi/strimzi-kafka-operator -n kafka --create-namespace --wait
          kubectl apply -f ./k8s/kafka/kafka-cluster.yaml -n kafka

      # 6. Deploy Hermes Microservices
      - name: Deploy Hermes CDN
        run: |
          kubectl apply -f ./k8s/origin/
          kubectl apply -f ./k8s/edge-pops/

      # 7. Validation
      - name: Verify Origin Pod Health
        run: kubectl wait --for=condition=ready pod -l app=origin-service --timeout=120s

      - name: Verify US Edge Pod Health
        run: kubectl wait --for=condition=ready pod -l app=us-edge --timeout=120s

      - name: Verify EU Edge Pod Health
        run: kubectl wait --for=condition=ready pod -l app=eu-edge --timeout=120s

      # 8. Debugging (Runs if anything fails)
      - name: Debug Cluster State
        if: failure()
        run: |
          docker images
          kubectl get pods -A