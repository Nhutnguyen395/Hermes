apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-nginx-config
data:
  nginx.conf: |
    events {}
    http {
      # Define the cache location, size (1GB), and memory zone (10MB per key)
      proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=hermes_cache:10m max_size=1g inactive=60m use_temp_path=off;
    
      # Rate Limit Zone: Allocate 10MB to track IPs ($binary_remote_addr). Limit to 1 request per seconds.
      limit_req_zone $http_x_simulated_ip zone=hermes_ratelimit:10m rate=1r/s;
    
      log_format cache_log '$http_x_simulated_ip - - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$upstream_cache_status"';
      access_log /var/log/nginx/access.log cache_log;
      
      upstream origin {
        server origin-service.default.svc.cluster.local:80;
      }
      
      server {
        listen 80;
      
        location / {
          # Apply the rate limit. Allow a "burst" of 2 requests to handle quick double-clicks.
          limit_req zone=hermes_ratelimit burst=2 nodelay;
    
          proxy_pass http://origin;
        
          # EXPLICIT CACHE KEY: We tell NGINX to just use the URI (e.g., /api/v1/assets/secure-image-1)
          proxy_cache_key "$request_uri";
          
          # Enable caching using the zone defined above
          proxy_cache hermes_cache;
          proxy_cache_valid 200 302 10m;
    
          # Ignore all spring security anti-caching headers
          proxy_ignore_headers Cache-Control Expires;
      
          # Expose the cache status (HIT, MISS, EXPIRED) to the client
          add_header X-Cache-Status $upstream_cache_status;
        }
      }
    }