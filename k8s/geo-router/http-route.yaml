apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-geo-route
  namespace: default
spec:
  parentRefs:
    - name: hermes-global-gateway # Attach to our Gateway
  rules:
    # RULE 1: If the user is in the US, route to the US Edge PoP
    - matches:
        - headers:
            - name: X-User-Region
              value: "US"
      backendRefs:
        - name: us-edge-service
          port: 80

    # RULE 2: If the user is in the EU, route to the EU Edge PoP
    - matches:
        - headers:
            - name: X-User-Region
              value: "EU"
      backendRefs:
        - name: eu-edge-service
          port: 80

    # RULE 3: Default Fallback (If no region is provided, default to US)
    - backendRefs:
        - name: us-edge-service
          port: 80