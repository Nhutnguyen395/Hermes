apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hermes-global-gateway
  namespace: default
spec:
  # This tells K8s to use the NGINX Gateway Fabric we just installed
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      # Allow routes from the same namespace to attach to this listener
      allowedRoutes:
        namespaces:
          from: Same